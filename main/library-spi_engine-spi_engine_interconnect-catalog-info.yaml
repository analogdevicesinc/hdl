apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: hdl-library-spi_engine-spi_engine_interconnect
  title: SPI_ENGINE_INTERCONNECT HDL IP core
  description: >
    The SPI Engine Interconnect allows connecting multiple spi_engine control-interface
    managers to a single spi_engine control-interface subordinate. This enables two
    command stream generators to connect to a single spi_engine execution and consequentially
    give them access to the same SPI bus. The interconnect module is responsible for
    proper arbitration between the command streams.

    Combining two command stream generators in a design and connecting them to a single
    execution module allows the creation of an efficient and flexible design by using
    standard components.
